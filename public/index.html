<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MathBoard Olimpiadas</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<header class="toolbar">
    <h1>MathBoard ⚡</h1>
    <h4>Olimpiadas Matemáticas <br> Jorge Alirio Mendza Rincón</h4>
    <div class="tools">
        <button data-tool="pen">✏️</button>
        <button data-tool="line">📏</button>
        <button data-tool="text">🔤</button>
        <button data-tool="highlighter">🖍️</button>
        <button data-tool="eraser">🧽</button>
    </div>

    <div class="colors">
        <button data-color="#000000" style="background:#000"></button>
        <button data-color="#ff0000" style="background:#f00"></button>
        <button data-color="#0000ff" style="background:#00f"></button>
        <button data-color="#00aa00" style="background:#0a0"></button>
    </div>

    <input type="range" id="sizePicker" min="1" max="25" value="3">
    <button id="clearBtn">🧹</button>
</header>
<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>

<canvas id="whiteboard"></canvas>

<script type="module" src="app.js"></script>
</body>
<footer class="mi footer">
    <p>&copy; 2026 MathBoard Olimpiadas. Todos los derechos reservados.</p>
    <p>&copy; Autor:JAMR.</p>
    <p>mi App MathBoard.</p>
</footer>
</html>
